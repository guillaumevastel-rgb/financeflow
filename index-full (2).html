
<!DOCTYPE html>

  <style>

/* FinanceFlow – Design Moderne + Mobile (Option D) */

:root {
  --bg: #f5f7fa;
  --text: #1a1a1a;
  --text-light: #666;
  --primary: #4361ee;
  --primary-light: #5a78ff;
  --card: #ffffff;
  --radius: 18px;
  --shadow: 0 4px 18px rgba(0,0,0,0.08);
  --transition: 0.25s ease;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f1117;
    --text: #f0f0f0;
    --text-light: #aaa;
    --card: #1a1d24;
    --shadow: 0 4px 22px rgba(0,0,0,0.3);
  }
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  font-family: 'Segoe UI', Roboto, Arial;
  color: var(--text);
}

h1, h2, h3 { margin: 0; }

/* HEADER */
header {
  padding: 25px;
  text-align: center;
  background: var(--primary);
  color: white;
  border-bottom-left-radius: 30px;
  border-bottom-right-radius: 30px;
  box-shadow: var(--shadow);
}

/* CONTAINER */
.container {
  padding: 20px;
  max-width: 700px;
  margin: auto;
}

/* CARD */
.card {
  background: var(--card);
  padding: 20px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 20px;
  transition: var(--transition);
}

.card:hover {
  transform: translateY(-2px);
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  padding: 14px;
  margin-top: 8px;
  border-radius: var(--radius);
  border: 1px solid #ddd;
  background: #fafafa;
  font-size: 15px;
  transition: var(--transition);
}

input:focus, select:focus, textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(67,97,238,0.15);
  outline: none;
}

/* BUTTONS */
.btn {
  width: 100%;
  padding: 15px;
  background: var(--primary);
  color: white;
  font-weight: bold;
  font-size: 16px;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: var(--transition);
}

.btn:hover {
  background: var(--primary-light);
}

.btn-secondary {
  background: #e3e6ef;
  color: var(--primary);
}

/* BADGES */
.badge {
  display: inline-block;
  background: #eef2ff;
  padding: 6px 12px;
  border-radius: 12px;
  font-size: 12px;
  margin-right: 5px;
  color: var(--primary);
}

/* RECEIPT PREVIEW */
.receipt-preview {
  width: 100%;
  height: 160px;
  border-radius: var(--radius);
  object-fit: cover;
  border: 1px solid #ddd;
  margin-top: 10px;
}

/* PROGRESS BAR */
.progress-bg {
  width: 100%;
  height: 10px;
  border-radius: 10px;
  background: #e4e4e4;
  overflow: hidden;
  margin-top: 8px;
}

.progress-bar {
  background: var(--primary);
  width: 0%;
  height: 100%;
  transition: width .3s;
}

/* ANIMATIONS */
.fade-in {
  animation: fadeIn .35s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* MOBILE */
@media (max-width: 600px) {
  .container { padding: 10px; }
  h1 { font-size: 1.6em; }
}

/* === UX FINAL PASS: modal, badges, focus, theme toggle === */
:root.theme-dark { --bg:#0f1117; --text:#f0f0f0; --text-light:#aaa; --card:#1a1d24; }

/* Focus visible for accessibility */
:focus-visible { outline: 3px solid rgba(67,97,238,.45); outline-offset: 2px; border-radius: 8px; }

/* Badges summary */
.badge-stat { display:inline-flex; align-items:center; gap:8px; background:#eef2ff; color:#4361ee; padding:8px 12px; border-radius:14px; font-weight:600; margin-right:8px; }
.badge-stat .v { font-weight:800; color:#1a1a1a; }

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:10000}
.modal{background:var(--card);width:min(560px,92vw);border-radius:16px;box-shadow:var(--shadow);padding:18px}
.modal header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.modal footer{display:flex;gap:12px;justify-content:flex-end;margin-top:12px}
.modal.show {animation: fadeIn .25s ease;}

/* Inputs in modal */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row > div{display:flex;flex-direction:column}
.form-error{color:#e63946;font-size:12px;height:14px;margin-top:4px}

/* Theme toggle */
.theme-toggle{background:#e3e6ef;color:#4361ee;border:none;border-radius:12px;padding:8px 12px;cursor:pointer;font-weight:700}

/* Lightbox image preview */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:11000}
.lightbox img{max-width:94vw;max-height:90vh;border-radius:10px}

/* === UX FINAL PASS ADDITIONS === */
.fab{position:fixed;right:20px;bottom:20px;background:#4361ee;color:#fff;border:none;border-radius:50%;width:56px;height:56px;font-size:26px;box-shadow:0 8px 24px rgba(67,97,238,.3);cursor:pointer}
.fab:hover{background:#5a78ff}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:10000}
.modal{background:var(--card);border-radius:18px;box-shadow:var(--shadow);max-width:520px;width:90%;padding:18px}
.modal header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.modal .close{background:transparent;border:none;font-size:22px;cursor:pointer}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid .full{grid-column:1/-1}
.input-hint{font-size:12px;color:var(--text-light)}
img.receipt-preview.big{height:220px;object-fit:contain;background:#f7f7f9}
.empty{padding:22px;text-align:center;color:var(--text-light)}
.button-row{display:flex;gap:10px}
.btn-danger{background:#e63946;color:#fff}
.btn-ghost{background:transparent;color:var(--primary);border:1px solid #e0e0f0}
.header-stats .kpi{display:inline-block;background:#fff;border-radius:14px;padding:10px 14px;margin:8px 6px;box-shadow:var(--shadow)}
.header-stats .kpi b{color:#4361ee}

  </style>
</head>

  <script>

// === DATA ENGINE BEGIN ===
let DB = [];
const DB_KEY = 'financeflow_db_v1';

function dbLoad(){
  try { DB = JSON.parse(localStorage.getItem(DB_KEY)) || []; }
  catch(e){ DB = []; }
}

function dbSave(){ localStorage.setItem(DB_KEY, JSON.stringify(DB)); }

function addExpense(obj){ DB.push(obj); dbSave(); }
function deleteExpense(id){ DB = DB.filter(x=>x.id!==id); dbSave(); }
function updateExpense(id,data){
  let i = DB.findIndex(x=>x.id===id);
  if(i>=0){ DB[i] = {...DB[i],...data}; dbSave(); }
}

function searchExpenses(q){
  q = q.toLowerCase();
  return DB.filter(x =>

    (x.note||'').toLowerCase().includes(q)
  );

function filterExpenses(opts){
  const {dateStart, dateEnd, cat, min, max, text} = opts;

if ('serviceWorker' in navigator) {

// === OCR MODULE ADVANCED BEGIN ===
async function runOCR(file){
  return Tesseract.recognize(file, 'fra', {
    logger:m=>console.log(m)
  }).then(({ data:{ text } }) => {
    let cleaned = text.replace(/\s+/g,' ').trim();
    let out = { total:null, ht:null, tva:[], date:null, magasin:null, paiement:null };

    // DATE extraction
    let dateRegex = /(\d{2})[\/\.-](\d{2})[\/\.-](\d{2,4})/;
    let d = cleaned.match(dateRegex);
    if(d){ out.date = `${d[3].length===2?'20'+d[3]:d[3]}-${d[2]}-${d[1]}`; }

    // TOTAL TTC extraction
    let totalRegex = /(total ttc|total\s*:|ttc)[^0-9]*([0-9]+[\.,][0-9]{2})/i;
    let t = cleaned.match(totalRegex);
    if(t){ out.total = parseFloat(t[2].replace(',', '.')); }

    // HT extraction
    let htRegex = /(ht|hors taxe)[^0-9]*([0-9]+[\.,][0-9]{2})/i;
    let h = cleaned.match(htRegex);
    if(h){ out.ht = parseFloat(h[2].replace(',', '.')); }

    // TVA extraction multi-rate
    let tvaRegex = /(tva[^0-9]*([0-9]{1,2}[\.,][0-9]{2})).*?([0-9]{1,2}[\.,]?[0-9]{0,2})%/gi;
    let m;
    while((m = tvaRegex.exec(cleaned)) !== null){
      out.tva.push({ amount: parseFloat(m[2].replace(',', '.')), rate: m[3] });
    }

    // MAGASIN (heuristic: first word in text)
    let firstLine = text.split(/
/)[0].trim();
    if(firstLine.length < 40) out.magasin = firstLine;

    // PAIEMENT detection
    if(/cb|carte|visa|mastercard/i.test(cleaned)) out.paiement = 'Carte Bancaire';
    if(/espèces|especes|cash/i.test(cleaned)) out.paiement = 'Espèces';

    return out;
  });
}
// === OCR MODULE ADVANCED END ===



// === OCR MODAL MODULE BEGIN ===
(function(){
  function byId(id){ return document.getElementById(id); }
  function fmt(n){ if(n==null) return ''; const v = (typeof n==='number')? n : parseFloat(n)||0; return v.toFixed(2); }

  // Local image compression (independent from UX module)
  async function compressForOCR(file, maxW=1800, maxH=1800, quality=0.9){
    return new Promise((resolve,reject)=>{
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        const r = Math.min(maxW/w, maxH/h, 1);
        const cw = Math.round(w*r), ch = Math.round(h*r);
        const c = document.createElement('canvas'); c.width=cw; c.height=ch;
        const ctx = c.getContext('2d');
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, 0, 0, cw, ch);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = URL.createObjectURL(file);
    });
  }

  function dataURLtoBlob(dataurl){
    const arr = dataurl.split(',');
    const mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    let n = bstr.length; const u8 = new Uint8Array(n);
    while(n--){ u8[n] = bstr.charCodeAt(n); }
    return new Blob([u8], {type:mime});
  }

  function populateOCRView(parsed){
    if(!parsed) return;
    if(byId('ocr-total')) byId('ocr-total').textContent = parsed.total!=null? fmt(parsed.total)+' €' : '—';
    if(byId('ocr-ht')) byId('ocr-ht').textContent = parsed.ht!=null? fmt(parsed.ht)+' €' : '—';
    if(byId('ocr-date')) byId('ocr-date').textContent = parsed.date || '—';
    if(byId('ocr-magasin')) byId('ocr-magasin').textContent = parsed.magasin || '—';
    if(byId('ocr-paiement')) byId('ocr-paiement').textContent = parsed.paiement || '—';
    const list = byId('ocr-tva-list');
    if(list){
      list.innerHTML='';
      (parsed.tva||[]).forEach(t=>{
        const li = document.createElement('li');
        li.textContent = `${t.rate!=null? t.rate+'%':''} ${t.amount!=null? fmt(t.amount)+' €':''}`;
        list.appendChild(li);
      });
      if((parsed.tva||[]).length===0){ const li = document.createElement('li'); li.textContent='—'; list.appendChild(li); }
    }
  }

  async function runModalAnalysis(file){
    try{
      if(window.UIPro) UIPro.showLoader();
      const dataUrl = await compressForOCR(file);
      const prev = byId('ocr-preview'); if(prev){ prev.src = dataUrl; prev.style.display='block'; }
      // Convert to Blob -> File-like object for runOCRPro
      const blob = dataURLtoBlob(dataUrl);
      const parsed = (typeof runOCRPro==='function')? await runOCRPro(new File([blob], 'ticket.jpg', {type: blob.type})) : (typeof runOCRPro==='undefined' && typeof runOCR==='function')? await runOCR(new File([blob], 'ticket.jpg', {type: blob.type})) : null;
      populateOCRView(parsed||{});
      // store parsed in modal dataset
      const modal = byId('ocr-modal'); if(modal) modal.dataset.parsed = JSON.stringify(parsed||{});
      // also keep dataUrl to inject as receipt later
      if(prev) prev.dataset.dataUrl = dataUrl;
    }catch(e){ console.error(e); if(window.UIPro) UIPro.showToast('Erreur OCR','error'); }
    finally{ if(window.UIPro) UIPro.hideLoader(); }
  }

  function applyToForm(){
    const modal = byId('ocr-modal'); if(!modal || !modal.dataset.parsed) return;
    const parsed = JSON.parse(modal.dataset.parsed);
    // Map to form fields
    const amount = (parsed && parsed.total!=null)? parsed.total : (parsed && parsed.ht!=null && parsed.tva && parsed.tva.length)? (parsed.ht + parsed.tva.reduce((a,b)=>a+(b.amount||0),0)) : null;
    if(byId('f-amount') && amount!=null) byId('f-amount').value = amount.toFixed(2);
    if(byId('f-date') && parsed && parsed.date) byId('f-date').value = parsed.date;
    // Compose note from magasin + paiement
    const note = [parsed && parsed.magasin? parsed.magasin:null, parsed && parsed.paiement? parsed.paiement:null].filter(Boolean).join(' • ');
    if(byId('f-note') && note) byId('f-note').value = note;
    // Attach preview as justificatif
    const prev = byId('ocr-preview'); if(prev && prev.dataset && prev.dataset.dataUrl){
      const formPrev = byId('f-preview'); if(formPrev){ formPrev.src = prev.dataset.dataUrl; formPrev.style.display='block'; formPrev.dataset.dataUrl = prev.dataset.dataUrl; }
    }
    if(window.UIPro) UIPro.showToast('Champs pré-remplis depuis l\'OCR','success');
  }

  function createExpenseFromOCR(){
    const modal = byId('ocr-modal'); if(!modal || !modal.dataset.parsed) return;
    const parsed = JSON.parse(modal.dataset.parsed);
    const amount = (parsed && parsed.total!=null)? parsed.total : (parsed && parsed.ht!=null && parsed.tva && parsed.tva.length)? (parsed.ht + parsed.tva.reduce((a,b)=>a+(b.amount||0),0)) : 0;
    const exp = {
      date: (parsed && parsed.date) || '',
      category: 'Divers',
      amount: amount,
      note: [parsed && parsed.magasin? parsed.magasin:null, parsed && parsed.paiement? parsed.paiement:null].filter(Boolean).join(' • ')
    };
    // include receipt image if present
    const prev = byId('ocr-preview'); if(prev && prev.dataset && prev.dataset.dataUrl){ exp.p = prev.dataset.dataUrl; }
    if(typeof addExpense==='function'){ addExpense(exp); }
    if(typeof renderUI==='function') renderUI();
    if(typeof renderReceipts==='function') renderReceipts();
    if(typeof updateChartsLite==='function') updateChartsLite();
    if(window.UIPro) UIPro.showToast('Dépense créée depuis l\'OCR','success');
    closeOCRModal();
  }

  function openOCRModal(){ const bd = byId('ocr-modal'); if(bd){ bd.style.display='flex'; } }
  function closeOCRModal(){ const bd = byId('ocr-modal'); if(bd){ bd.style.display='none'; bd.dataset.parsed=''; const p=byId('ocr-preview'); if(p){p.src=''; p.style.display='none'; p.dataset.dataUrl='';} } }

  // Bind once
  document.addEventListener('DOMContentLoaded', ()=>{
    const btn = byId('btn-ocr-modal'); if(btn) btn.addEventListener('click', openOCRModal);
    const close = byId('ocr-close'); if(close) close.addEventListener('click', closeOCRModal);
    const file = byId('ocr-file'); if(file) file.addEventListener('change', (e)=>{ const f=e.target.files&&e.target.files[0]; if(f) runModalAnalysis(f); });
    const apply = byId('ocr-apply'); if(apply) apply.addEventListener('click', applyToForm);
    const create = byId('ocr-create'); if(create) create.addEventListener('click', createExpenseFromOCR);
  });

  // Expose for debug
  window.openOCRModal = openOCRModal;
})();
// === OCR MODAL MODULE END ===

if (typeof renderUI==='function') renderUI();
if (typeof renderReceipts==='function') renderReceipts();
  </script>
